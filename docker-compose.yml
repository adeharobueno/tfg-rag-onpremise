services:
  # ============================================================================
  # MOTOR DE BASE DE DATOS RELACIONAL-VECTORIAL (POSTGRESQL + PGVECTOR)
  # ============================================================================
  postgres_db:
    image: pgvector/pgvector:pg16  # Imagen oficial con PostgreSQL 16 y pgvector preinstalado
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Mapeo físico al volumen sdb (100 GB) optimizado para el motor de datos
      - ${LOCAL_PGDATA_DIR}/postgres_data:/var/lib/postgresql/data
      # NUEVO: Inyección automatizada de scripts de inicialización de la base de datos
      - ./database:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE}
      -c work_mem=${PG_WORK_MEM}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM}
      -c random_page_cost=${PG_RANDOM_PAGE_COST}
      -c seq_page_cost=${PG_SEQUENTIAL_PAGE_COST}
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY}
      -c synchronous_commit=${PG_SYNCHRONOUS_COMMIT}
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_gateway -d tfg_rag_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # MOTOR DE INFERENCIA LOCAL (OLLAMA ENGINE)
  # ============================================================================
  ollama_engine:
    image: ollama/ollama:0.24.0  # Versión fijada — RNF-M02
    container_name: ollama_engine
    restart: always
    volumes:
      # Mapeo físico al volumen sda (150 GB) reservado para modelos pesados (Llama 3.1)
      - ${LOCAL_OLLAMA_DIR}/ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2  # Permite procesar consultas en paralelo aprovechando los hilos del Xeon
    networks:
      - rag_network

  # ============================================================================
  # PIPELINE DE INGESTA Y ETL AUTOMATIZADA (N8N)
  # ============================================================================
  ollama_n8n:
    build: .
    container_name: n8n_automation
    ports:
      - "10.239.232.84:5678:5678" 
    restart: always
    environment:
      - NODE_FUNCTION_ALLOW_EXTERNAL=pdf-parse
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_DISABLED=${N8N_USER_MANAGEMENT_DISABLED}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/documents;/home/node/.n8n-files
      - NODES_EXCLUDE=[]
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=internal
      - N8N_RUNNERS_TASK_TIMEOUT=300
      - N8N_RUNNERS_MAX_CONCURRENCY=20
      - N8N_RUNNERS_TASK_BROKER_TIMEOUT=300
      - NODE_PATH=/usr/local/lib/node_modules:/home/node/node_modules
      - NODE_OPTIONS=--stack-trace-limit=50
      - N8N_LOG_LEVEL=debug
      - N8N_SECURE_COOKIE=false
    volumes:
      # Almacenamiento local de n8n persistido en la raíz de datos (sdb)
      - ${LOCAL_PGDATA_DIR}/n8n_data:/home/node/.n8n
      # PUENTE CRÍTICO: Mapea la carpeta de la VM dentro del contenedor
      - ./documents:/data/documents
    depends_on:
      - postgres_db
    networks:
      - rag_network

  # ============================================================================
  # CAPA DE INTERMEDIACIÓN Y AUTENTICACIÓN JWT (FASTAPI BACKEND)
  # ============================================================================
  api_gateway:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api_gateway_container
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://api_gateway:${API_GATEWAY_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - DATABASE_URL_ADMIN=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - rag_network
    depends_on:
      postgres_db:
        condition: service_healthy

   # ============================================================================
   # CAPA DE EVALUADOR ASÍNCRONO (AUDIT_WORKER)
   # ============================================================================
  audit_worker:
    build: ./audit_worker
    container_name: audit_worker
    env_file:
      - .env
    depends_on:
      - postgres_db
      - ollama_engine
    networks:
      - rag_network
    restart: unless-stopped

  # ============================================================================
  # CLIENTE WEB (STREAMLIT)
  # ============================================================================ 
  streamlit_gui:
    build: ./streamlit_gui
    container_name: streamlit_gui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - API_GATEWAY_URL=http://api_gateway:8000
    depends_on:
      - api_gateway
    networks:
      - rag_network
    restart: unless-stopped

# ==============================================================================
# DEFINICIÓN DE REDES CONFINADAS (AISLAMIENTO SOBERANO)
# ==============================================================================
networks:
  rag_network:
    driver: bridge
    internal: false # Desactivar o restringir según la política estricta de red local
